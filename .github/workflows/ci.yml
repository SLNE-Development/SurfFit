name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://surffit:surffit@localhost:5432/surffit
      RABBITMQ_URL: amqp://surffit:surffit@localhost:5672
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: ci-secret
      AUTH_URL: http://localhost:3000
      AUTH_DISCORD_ID: ci-discord-id
      AUTH_DISCORD_SECRET: ci-discord-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm check-types

      - run: pnpm test

      - run: pnpm test:integration

      - run: pnpm build

  docker:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          push: false

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker.Dockerfile
          push: false

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/migrator.Dockerfile
          push: false
