name: surffit-prod

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: surffit
      POSTGRES_USER: surffit
      POSTGRES_PASSWORD: surffit
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surffit -d surffit"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: surffit
      RABBITMQ_DEFAULT_PASS: surffit
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: surffit
      MINIO_ROOT_PASSWORD: surffit123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/readyz"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrator:
    build:
      context: ..
      dockerfile: docker/migrator.Dockerfile
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    env_file: ../.env
    environment:
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    env_file: ../.env
    environment:
      PORT: 3001
    depends_on:
      migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
